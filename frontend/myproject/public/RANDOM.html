<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --primary-color:rgb(21, 131, 228);
            --secondary-color: #f1c40f;
            --dark-color: #2c3e50;
            --bg-color: #f9f9f9;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Navigation */
        nav {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
        }

        nav button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: white;
            color: var(--dark-color);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav button.active {
            background: var(--secondary-color);
            color: var(--dark-color);
        }

        /* Wheel Container */
        .main-container {
            position: relative;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wheel-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            z-index: 10;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        #spin-btn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 1.2rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(14, 117, 234, 0.4);
        }

        #spin-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Result Popup */
        #result-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .result-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .result-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>

    function normalizeName(text) {
        return String(text || '')
            .trim()
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z0-9\s]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function addDishToCart(dishId, qty = 1) {
        if (!dishId) return false;
        try {
            const raw = localStorage.getItem(CART_KEY);
            const parsed = raw ? JSON.parse(raw) : {};
            const cart = (parsed && typeof parsed === 'object') ? parsed : {};
            const prevQty = Number(cart[dishId] ?? 0);
            cart[dishId] = Math.max(0, Math.floor(prevQty + qty));
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
            return true;
        } catch {
            return false;
        }
    }

    function addPending(dishId, qty) {
        try {
            const raw = sessionStorage.getItem(PENDING_KEY);
            const parsed = raw ? JSON.parse(raw) : {};
            const obj = (parsed && typeof parsed === 'object') ? parsed : {};
            const adds = (obj.adds && typeof obj.adds === 'object') ? obj.adds : {};
            const prev = Number(adds[dishId] ?? 0);
            adds[dishId] = Math.max(0, Math.floor(prev + qty));
            sessionStorage.setItem(PENDING_KEY, JSON.stringify({ adds }));
        } catch {}
    }

    function findDishIdByName(itemName) {
        const key = normalizeName(itemName);
        if (!key) return null;
        if (nameToDishId[key]) return nameToDishId[key];

        // fuzzy match: allow wheel short names to match longer dish names
        const entries = Object.entries(nameToDishId);
        const found = entries.find(([k]) => k.includes(key) || key.includes(k));
        return found ? found[1] : null;
    }

    // Initialize Navigation
    Object.keys(menuData).forEach(cat => {
        const btn = document.createElement('button');
        btn.innerText = cat;
        if (cat === currentCategory) btn.classList.add('active');
        btn.onclick = () => {
            if (isSpinning) return;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = cat;
            drawWheel();
        };
        nav.appendChild(btn);
    });

    function drawWheel() {
        const items = menuData[currentCategory];
        const numItems = items.length;
        const arc = (2 * Math.PI) / numItems;
        const colors = ["#ff7675", "#fab1a0", "#ffeaa7", "#55efc4", "#81ecec", "#74b9ff", "#a29bfe", "#dfe6e9"];

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        items.forEach((item, i) => {
            const angle = i * arc;
            
            // Draw slice
            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(500, 500);
            ctx.arc(500, 500, 480, angle, angle + arc);
            ctx.fill();
            ctx.stroke();

            // Add Text
            ctx.save();
            ctx.translate(500, 500);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#333";
            ctx.font = "bold 24px Quicksand";
            ctx.fillText(item.name, 450, 10);
            ctx.restore();
        });

        // Add Center Circle
        ctx.beginPath();
        ctx.arc(500, 500, 50, 0, 2 * Math.PI);
        ctx.fillStyle = "white";
        ctx.fill();
        ctx.strokeStyle = varColor('--primary-color');
        ctx.lineWidth = 5;
        ctx.stroke();
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

    spinBtn.onclick = () => {
        if (isSpinning) return;
        
        isSpinning = true;
        spinBtn.disabled = true;
        
        const items = menuData[currentCategory];
        const extraDegrees = Math.floor(Math.random() * 360) + 3600; // Quay ít nhất 10 vòng
        currentRotation += extraDegrees;
        
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            isSpinning = false;
            spinBtn.disabled = false;
            
            // Calculate result
            const actualDeg = currentRotation % 360;
            const arcDeg = 360 / items.length;
            // Pointer is at the top (-90 deg from start)
            const winningIndex = Math.floor((360 - (actualDeg % 360) + 270) % 360 / arcDeg);
            showResult(items[winningIndex]);
        }, 4000);
    };

    function showResult(item) {
        lastWinningItem = item;
        document.getElementById('food-name').innerText = item.name;
        document.getElementById('food-img').src = item.img;
        document.getElementById('result-overlay').style.display = 'flex';
    }

    function closeResult() {
        document.getElementById('result-overlay').style.display = 'none';
    }

    function orderNow() {
        if (!lastWinningItem) return closeResult();
        const normalized = normalizeName(lastWinningItem.name);

        // If it's a combo, add all items in that combo
        const comboItems = comboToItems[normalized];
        if (Array.isArray(comboItems) && comboItems.length > 0) {
            comboItems.forEach((ci) => {
                addDishToCart(ci.dishId, ci.quantity);
                addPending(ci.dishId, ci.quantity);
            });
        } else {
            const dishId = findDishIdByName(lastWinningItem.name);
            if (!dishId) {
                alert('Món này chưa có trong menu của hệ thống để thêm vào giỏ hàng. Vui lòng chọn món khác.');
                return;
            }
            addDishToCart(dishId, 1);
            addPending(dishId, 1);
        }

        // Go to React cart page
        window.location.href = '/gio-hang';
    }

    drawWheel();
</script>

</body>
